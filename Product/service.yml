apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  selector:
    app: product-service
  ports:
    - protocol: TCP
      port: 80        # Port exposed to the cluster
      targetPort: 9000 # Port your Spring Boot app is listening on
      nodePort: 30007
  type: LoadBalancer  # Use NodePort if you're on a local Minikube setup